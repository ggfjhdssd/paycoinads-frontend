<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // ═══════════════════════════════════════
    // API Base URL — set by Vercel env var
    // VERCEL env: VITE_API_URL = https://your-backend.onrender.com
    // ═══════════════════════════════════════
    window.__API_BASE__ = "%%VITE_API_URL%%";
  </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Wheel • PayCoinAds</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Adsgram SDK (Block ID: 23920) -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Pyidaungsu&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Pyidaungsu', sans-serif;
        }
        body {
            background: #121212;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .back-btn {
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            color: #ffd700;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }
        .balance {
            background: rgba(255,215,0,0.15);
            padding: 8px 16px;
            border-radius: 30px;
            color: #ffd700;
            font-weight: 700;
        }
        .ticket-badge {
            background: rgba(255,215,0,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #ffd700;
            margin: 10px 0;
            display: inline-block;
        }
        .wheel-container {
            position: relative;
            margin: 40px 0;
            width: 280px;
            height: 280px;
            margin-left: auto;
            margin-right: auto;
        }
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            /* 8 segments with distinct colors - MATCHES PRIZE ORDER */
            background: conic-gradient(
                #ffd700 0deg 45deg,      /* 200 coins */
                #ff8c00 45deg 90deg,     /* 20 coins */
                #ff6b6b 90deg 135deg,    /* 15 coins */
                #4ecdc4 135deg 180deg,   /* Try Again */
                #a8e6cf 180deg 225deg,   /* Free Spin */
                #ffd3b6 225deg 270deg,   /* 100 coins */
                #ffaaa5 270deg 315deg,   /* 50 coins */
                #ff8b94 315deg 360deg    /* 30 coins */
            );
            border: 8px solid #222;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .wheel-label {
            position: absolute;
            width: 50%;
            height: 40px;
            top: 50%;
            left: 50%;
            transform-origin: 0% 50%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 20px;
            font-weight: 800;
            color: #121212;
            font-size: 14px;
            text-shadow: 0 0 3px rgba(255,255,255,0.8);
            pointer-events: none;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: #ffd700;
            filter: drop-shadow(0 0 10px gold);
            z-index: 10;
        }
        .spin-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            color: #121212;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            margin: 20px 0;
            box-shadow: 0 8px 20px rgba(255,215,0,0.3);
            width: 100%;
        }
        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .ad-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .ad-header {
            font-size: 16px;
            margin-bottom: 10px;
            color: #ffd700;
        }
        .ad-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        .ad-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .claim-btn {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: #121212;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin: 5px 0 10px;
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
            transition: opacity 0.3s;
        }
        .claim-btn:disabled {
            opacity: 0.3;
            box-shadow: none;
            cursor: not-allowed;
            background: #555;
            color: #aaa;
        }
        .cooldown-timer {
            color: #ffd700;
            font-size: 14px;
            margin-top: 5px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #ffd700;
            width: 0%;
            transition: width 0.3s;
        }
        /* Referral section with its own claim button */
        .referral-section {
            margin-top: 20px;
        }
        .referral-box {
            background: rgba(255,215,0,0.1);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid #ffd700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .referral-box span {
            font-size: 16px;
            font-weight: 600;
            color: #ffd700;
        }
        .referral-hint {
            font-size: 13px;
            color: #aaa;
            margin: 5px 0 10px;
            text-align: center;
        }
        .custom-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #1e1e2e, #16161f);
            border: 2px solid #ffd700;
            border-radius: 24px;
            padding: 24px;
            z-index: 1000;
            width: 80%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: none;
        }
        .custom-alert.active {
            display: block;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn {
            from { transform: translate(-50%, -40%); opacity: 0; }
            to { transform: translate(-50%, -50%); opacity: 1; }
        }
        .custom-alert h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffd700;
        }
        .custom-alert p {
            font-size: 16px;
            margin: 15px 0;
            color: #fff;
        }
        .alert-close {
            background: #ffd700;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: #121212;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 999;
            display: none;
        }
        .overlay.active {
            display: block;
        }
        .footer {
            color: #5e5e71;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="back-btn" onclick="goBack()">← Back</div>
            <div class="balance">🪙 <span id="coinBalance">0</span></div>
        </div>

        <h1 style="color:#ffd700; margin-bottom:10px;">🎡 Lucky Wheel</h1>
        <div class="ticket-badge" id="ticketCount">🎟️ Tickets: 0</div>

        <div class="wheel-container">
            <div class="pointer">▼</div>
            <div class="wheel" id="wheel">
                <!-- Wheel labels will be injected by JS -->
            </div>
        </div>

        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎡 SPIN NOW</button>

        <!-- Ad Section with Progress Bar (no numbers) -->
        <div class="ad-section">
            <div class="ad-header">Watch 5 ads to get 1 Free Spin</div>
            <div class="progress-bar">
                <div class="progress-fill" id="adProgress"></div>
            </div>
            <button class="ad-btn" id="adBtn" onclick="watchAd()">📺 Watch Ad</button>
            <!-- Claim Ticket for Ads -->
            <button class="claim-btn" id="claimBtn" onclick="claimTicket()" disabled>🎟️ Claim Ticket</button>
            <div class="cooldown-timer" id="cooldownTimer"></div>
        </div>

        <!-- Referral Section with separate Claim Button -->
        <div class="referral-section">
            <div class="referral-box" onclick="shareInvite()">
                <span>Invite Friends (Get 1 Ticket per 5 Friends)</span>
            </div>
            <div class="referral-hint" id="referralHint"></div>
            <button class="claim-btn" id="claimReferralBtn" onclick="claimReferralTicket()" disabled>🎟️ Claim Referral Ticket</button>
        </div>

        <div class="footer">
            Good luck!
        </div>
    </div>

    <!-- Custom Alert -->
    <div class="overlay" id="overlay"></div>
    <div class="custom-alert" id="customAlert">
        <h3 id="alertTitle">🎉</h3>
        <p id="alertMessage"></p>
        <button class="alert-close" onclick="closeAlert()">OK</button>
    </div>

    <script>
        const API_BASE = (window.__API_BASE__ || '') + '/api';
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }
        const initData = tg?.initData || '';
        let currentUserId = null;
        let coins = 0;
        let spinTickets = 0;
        let adWatchCount = 0;
        let lastAdWatch = 0;          // Timestamp of last ad watch (for 3s cooldown)
        let adCooldownEndTime = 0;     // Timestamp when 2-hour cooldown ends
        // Referral data
        let referralCount = 0;
        let unclaimedReferrals = 0;
        let claimableReferralTickets = 0;
        let remainingForNext = 5;

        // ==================== Adsgram Initialization (Block ID: 23920) ====================
        let AdController = null;
        try {
            if (window.Adsgram) {
                AdController = window.Adsgram.init({ blockId: "23920" });
                console.log('✅ Adsgram initialized with blockId 23920');
            } else {
                console.warn('Adsgram SDK not loaded');
            }
        } catch (e) {
            console.error('Failed to initialize Adsgram:', e);
        }

        // DOM elements
        const coinBalanceSpan = document.getElementById('coinBalance');
        const ticketCountSpan = document.getElementById('ticketCount');
        const spinBtn = document.getElementById('spinBtn');
        const adBtn = document.getElementById('adBtn');
        const claimBtn = document.getElementById('claimBtn');
        const claimReferralBtn = document.getElementById('claimReferralBtn');
        const adProgressFill = document.getElementById('adProgress');
        const cooldownTimerSpan = document.getElementById('cooldownTimer');
        const referralHintSpan = document.getElementById('referralHint');
        const wheelDiv = document.getElementById('wheel');

        // Custom alert elements
        const overlay = document.getElementById('overlay');
        const customAlert = document.getElementById('customAlert');
        const alertTitle = document.getElementById('alertTitle');
        const alertMessage = document.getElementById('alertMessage');

        // ==================== STRICT PRIZE ORDER (Must match Backend) ====================
        const PRIZES = [
            '200 coins',    // index 0
            '20 coins',     // index 1
            '15 coins',     // index 2
            'Try Again',    // index 3
            'Free Spin',    // index 4
            '100 coins',    // index 5
            '50 coins',     // index 6
            '30 coins'      // index 7
        ];

        // Create wheel labels
        function createWheelLabels() {
            wheelDiv.innerHTML = ''; // Clear existing content
            PRIZES.forEach((prize, i) => {
                const label = document.createElement('div');
                label.className = 'wheel-label';
                // Rotate each label to the center of its segment (i*45 + 22.5 degrees)
                label.style.transform = `translate(-0%, -50%) rotate(${i * 45 + 22.5}deg)`;
                // Display short text
                let displayText = prize.replace(' coins', '');
                if (prize === 'Try Again') displayText = 'Try';
                if (prize === 'Free Spin') displayText = 'Free';
                label.innerText = displayText;
                wheelDiv.appendChild(label);
            });
        }

        async function fetchUser() {
            try {
                const res = await fetch(`${API_BASE}/user`, {
                    headers: { 'X-Telegram-Init-Data': initData }
                });
                const data = await res.json();
                if (res.ok) {
                    coins = data.coins;
                    spinTickets = data.spinTickets || 0;
                    adWatchCount = data.adWatchCount || 0;
                    referralCount = data.referralCount || 0;
                    unclaimedReferrals = data.unclaimedReferrals || 0;
                    adCooldownEndTime = data.adCooldownEndTime || 0; // Make sure to get this
                    currentUserId = data.userId;

                    updateUI();
                    fetchAdStatus();
                    fetchReferralStatus();
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function fetchAdStatus() {
            try {
                const res = await fetch(`${API_BASE}/games/ad-status`, {
                    headers: { 'X-Telegram-Init-Data': initData }
                });
                const data = await res.json();
                if (res.ok) {
                    adWatchCount = data.adWatchCount;
                    spinTickets = data.tickets;
                    lastAdWatch = data.lastAdWatch || 0;
                    adCooldownEndTime = data.cooldownEndTime || 0;
                    
                    updateUI();
                    updateAdButtonState();
                }
            } catch (err) {
                console.error(err);
            }
        }

        // ==================== UPDATED Ad Button State Function (Cooldown ကို အရင်ဆုံး စစ်) ====================
        function updateAdButtonState() {
            const now = Date.now();
            
            // ၁။ ၂ နာရီ Cooldown ကို အရင်ဆုံး စစ်မယ် (ဒါက အရေးကြီးဆုံးပဲ)
            if (adCooldownEndTime && adCooldownEndTime > now) {
                const remainingMs = adCooldownEndTime - now;
                disableAdButton(remainingMs, 'cooldown');
                return; // Cooldown ရှိရင် အောက်က logic တွေကို ဆက်မလုပ်တော့ဘူး
            }
            
            // ၂။ Cooldown မရှိမှ ကြော်ငြာ ၅ ကြိမ် ပြည့်/မပြည့် စစ်မယ်
            if (adWatchCount >= 5) {
                adBtn.disabled = true;
                adBtn.innerText = '✅ Limit Reached';
                cooldownTimerSpan.innerText = 'Please claim your ticket first!';
                return;
            }

            // ၃။ ကြော်ငြာတစ်ခုနဲ့ တစ်ခုကြား ၃ စက္ကန့် စောင့်ခိုင်းတာ
            if (lastAdWatch > 0) {
                const timeSinceLastAd = now - lastAdWatch;
                if (timeSinceLastAd < 3000) {
                    const remaining = 3000 - timeSinceLastAd;
                    disableAdButton(remaining, 'short');
                    return;
                }
            }
            
            // ပုံမှန် အခြေအနေဆိုရင် ပြန်ဖွင့်ပေးမယ်
            adBtn.disabled = false;
            adBtn.innerText = '📺 Watch Ad';
            cooldownTimerSpan.innerText = '';
        }

        function disableAdButton(duration, type = 'short') {
            adBtn.disabled = true;
            
            if (type === 'cooldown') {
                // 2-hour cooldown: show countdown timer HH:MM:SS
                adBtn.innerText = '⏳ Cooldown Active';
                
                const updateTimer = () => {
                    const now = Date.now();
                    const remaining = Math.max(0, adCooldownEndTime - now);
                    if (remaining <= 0) {
                        if (window.cooldownInterval) clearInterval(window.cooldownInterval);
                        fetchAdStatus(); // Refresh status
                        return;
                    }
                    const hours = Math.floor(remaining / 3600000);
                    const minutes = Math.floor((remaining % 3600000) / 60000);
                    const seconds = Math.floor((remaining % 60000) / 1000);
                    cooldownTimerSpan.innerText = 
                        `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                };
                
                updateTimer();
                if (window.cooldownInterval) clearInterval(window.cooldownInterval);
                window.cooldownInterval = setInterval(updateTimer, 1000);
            } else {
                // 3-second cooldown between ads
                const seconds = Math.ceil(duration / 1000);
                adBtn.innerText = `⏳ Wait ${seconds}s`;
                cooldownTimerSpan.innerText = '';
                
                setTimeout(() => {
                    updateAdButtonState();
                }, duration);
            }
        }

        async function fetchReferralStatus() {
            try {
                const res = await fetch(`${API_BASE}/games/invite-status`, {
                    headers: { 'X-Telegram-Init-Data': initData }
                });
                const data = await res.json();
                if (res.ok) {
                    // Update referral-related variables
                    unclaimedReferrals = data.unclaimedReferrals || 0;
                    claimableReferralTickets = data.claimableTickets || 0;
                    remainingForNext = data.remainingForNext || 5;
                    spinTickets = data.tickets; // ensure latest tickets
                    
                    // Update hint
                    referralHintSpan.innerText = data.message;
                    
                    updateUI();
                }
            } catch (err) {
                console.error(err);
            }
        }

        function updateUI() {
            coinBalanceSpan.innerText = coins.toLocaleString();
            ticketCountSpan.innerText = `🎟️ Tickets: ${spinTickets}`;
            // Progress bar width based on adWatchCount (0-5)
            adProgressFill.style.width = `${(adWatchCount / 5) * 100}%`;

            // Spin button: enabled if tickets > 0
            spinBtn.disabled = spinTickets <= 0;

            // Ad Claim button: enabled only if adWatchCount >= 5 AND not in cooldown
            const now = Date.now();
            const canClaim = (adWatchCount >= 5) && (adCooldownEndTime <= now);
            claimBtn.disabled = !canClaim;

            // Referral Claim button: enabled if claimableReferralTickets > 0
            claimReferralBtn.disabled = claimableReferralTickets <= 0;
        }

        function goBack() {
            window.location.href = '/games.html';
        }

        function showAlert(title, message) {
            alertTitle.innerText = title;
            alertMessage.innerText = message;
            overlay.classList.add('active');
            customAlert.classList.add('active');
        }

        function closeAlert() {
            overlay.classList.remove('active');
            customAlert.classList.remove('active');
        }

        // ==================== Spin Wheel ====================
        async function spinWheel() {
            if (spinTickets <= 0) {
                showAlert('😢', 'You have no tickets! Watch ads or invite friends to earn tickets.');
                return;
            }

            spinBtn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/games/spin`, {
                    method: 'POST',
                    headers: { 'X-Telegram-Init-Data': initData }
                });
                const data = await res.json();

                if (res.ok) {
                    const prizeIndex = data.prizeIndex;
                    
                    if (prizeIndex === undefined || prizeIndex < 0 || prizeIndex >= 8) {
                        console.error('Invalid prize index from server:', prizeIndex);
                        showAlert('Error', 'Invalid prize from server');
                        spinBtn.disabled = spinTickets <= 0;
                        return;
                    }

                    const segmentAngle = 45;
                    const offset = 22.5;
                    const targetRotation = 360 - (prizeIndex * segmentAngle + offset);
                    const spins = 5;
                    const totalRotation = targetRotation + (360 * spins);

                    wheelDiv.style.transform = `rotate(${totalRotation}deg)`;

                    // Use data.prize to show correct name
                    setTimeout(() => {
                        showAlert(
                            data.type === 'coin' ? '🎉' : data.type === 'freespin' ? '🎡' : '😢',
                            `You won ${data.prize}!`
                        );
                        coins = data.newCoins;
                        spinTickets = data.newTickets;
                        updateUI();
                        fetchReferralStatus(); // refresh referral status (tickets may have changed)
                    }, 4000);
                } else {
                    showAlert('Error', data.error || 'Something went wrong');
                    spinBtn.disabled = spinTickets <= 0;
                }
            } catch (err) {
                console.error(err);
                showAlert('Error', 'Network error');
                spinBtn.disabled = spinTickets <= 0;
            }
        }

        // ==================== Watch Ad (only increments count) ====================
        async function watchAd() {
            if (!AdController) {
                showAlert('Error', 'Adsgram not initialized');
                return;
            }
            
            if (adBtn.disabled) return;

            try {
                const result = await AdController.show();
                console.log('Ad finished:', result);
                
                if (result && result.done) {
                    const res = await fetch(`${API_BASE}/games/watch-ad`, {
                        method: 'POST',
                        headers: { 'X-Telegram-Init-Data': initData }
                    });
                    
                    const data = await res.json();

                    if (res.ok) {
                        showAlert('📺 Ad Watched', data.message);
                        adWatchCount = data.adWatchCount;
                        spinTickets = data.tickets;
                        
                        if (data.cooldownEndTime) {
                            adCooldownEndTime = data.cooldownEndTime;
                        }
                        
                        await fetchAdStatus(); // Refresh full state
                        updateUI();
                    } else {
                        if (data.error) {
                            showAlert('Error', data.error);
                        }
                    }
                } else {
                    showAlert('😢', 'You need to complete the ad to earn progress.');
                }
            } catch (err) {
                console.error('Ad error:', err);
                showAlert('Error', 'Ad viewing failed or was cancelled');
            }
        }

        // ==================== UPDATED Claim Ticket from Ads (Cooldown ချက်ချင်း စတင်) ====================
        async function claimTicket() {
            if (claimBtn.disabled) return;

            try {
                const res = await fetch(`${API_BASE}/games/claim-ticket`, {
                    method: 'POST',
                    headers: { 'X-Telegram-Init-Data': initData }
                });
                const data = await res.json();

                if (res.ok) {
                    showAlert('🎟️ Ticket Claimed!', data.message);
                    
                    // အချက်အလက်အသစ်တွေကို Update လုပ်မယ်
                    spinTickets = data.tickets;
                    adWatchCount = data.adWatchCount;
                    adCooldownEndTime = data.cooldownEndTime; // ၂ နာရီ Cooldown အချိန်ကို ရယူမယ်
                    
                    // UI ကို ချက်ချင်း Update လုပ်ပြီး Cooldown Timer ပြမယ်
                    updateUI();
                    updateAdButtonState(); 
                    
                    // သေချာစေဖို့ ၁ စက္ကန့်အကြာမှာ fetchAdStatus ကို ထပ်ခေါ်မယ်
                    setTimeout(() => {
                        fetchAdStatus();
                    }, 1000);
                } else {
                    showAlert('Error', data.error || 'Failed to claim ticket');
                }
            } catch (err) {
                console.error(err);
                showAlert('Error', 'Network error');
            }
        }

        // ==================== Claim Referral Ticket ====================
        async function claimReferralTicket() {
            if (claimReferralBtn.disabled) return;

            try {
                const res = await fetch(`${API_BASE}/games/claim-referral-ticket`, {
                    method: 'POST',
                    headers: { 'X-Telegram-Init-Data': initData }
                });
                const data = await res.json();

                if (res.ok) {
                    showAlert('🎟️ Referral Ticket Claimed!', data.message);
                    spinTickets = data.tickets;
                    unclaimedReferrals = data.unclaimedReferrals;
                    // Re-fetch referral status to update claimable count and hint
                    await fetchReferralStatus();
                    updateUI();
                } else {
                    showAlert('Error', data.error || 'Failed to claim referral ticket');
                }
            } catch (err) {
                console.error(err);
                showAlert('Error', 'Network error');
            }
        }

        async function shareInvite() {
            if (!currentUserId) {
                await fetchUser();
            }
            const shareUrl = `https://t.me/paycoinmm_bot?start=${currentUserId}`;
            const shareText = `ဖုန်းလေးပွတ်ရင်း အပိုဝင်ငွေ ရှာချင်သူများအတွက် PayCoinAds 🐻\n\nကျွန်တော့်ရဲ့ Link ကနေ ဝင်ဆော့ရုံနဲ့ Coins တွေ စုပြီး ငွေထုတ်လို့ရပြီနော်! အခုပဲ စမ်းကြည့်လိုက်ပါ။ 👇\n\n${shareUrl}`;
            const fullLink = `https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}`;
            if (tg && tg.openTelegramLink) {
                tg.openTelegramLink(fullLink);
            } else {
                window.open(fullLink, '_blank');
            }
        }

        // Initialize wheel labels
        createWheelLabels();

        // Initialize data fetching
        fetchUser();
        setInterval(fetchUser, 30000);
        setInterval(fetchAdStatus, 10000);
        setInterval(fetchReferralStatus, 30000);
    </script>
</body>
