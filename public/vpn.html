<!DOCTYPE html>
<html lang="my">
<head>
  <script>
    // ═══════════════════════════════════════
    // API Base URL — set by Vercel env var
    // VERCEL env: VITE_API_URL = https://your-backend.onrender.com
    // ═══════════════════════════════════════
    window.__API_BASE__ = "%%VITE_API_URL%%";
  </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security Check • PayCoinAds</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Pyidaungsu&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffd700;
            --accent: #ff8c00;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Pyidaungsu', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Animation */
        .ambient-light {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out alternate;
        }
        .orb-1 { width: 300px; height: 300px; background: var(--primary); top: -50px; left: -50px; }
        .orb-2 { width: 250px; height: 250px; background: #ff4500; bottom: -50px; right: -50px; animation-delay: -2s; }
        
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 50px); }
        }

        /* Main Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            padding: 40px 30px;
            border-radius: 32px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        /* Top Accent Line */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        /* Icons & Animation */
        .icon-container {
            position: relative;
            height: 100px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flag-icon {
            font-size: 60px;
            z-index: 2;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4));
            animation: pulse-flag 3s infinite ease-in-out;
        }

        .shield-bg {
            position: absolute;
            font-size: 100px;
            opacity: 0.1;
            color: var(--primary);
            animation: rotate-shield 10s infinite linear;
        }

        @keyframes pulse-flag {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Status Box */
        .status-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-label { font-size: 12px; color: #666; }
        .status-value { font-weight: bold; color: #fff; display: flex; align-items: center; gap: 5px; }
        
        /* Button */
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            color: #000;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:active { transform: scale(0.98); }
        
        .btn-pulse {
            animation: btn-glow 2s infinite;
        }

        @keyframes btn-glow {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.3);
            border-top: 3px solid #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Hide elements initially */
        .hidden { display: none !important; }

    </style>
</head>
<body>

    <div class="ambient-light">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="card">
        <div class="icon-container">
            <div class="shield-bg">🛡️</div>
            <div class="flag-icon" style="font-size:48px;letter-spacing:4px;">🇸🇬 🇺🇸</div>
        </div>

        <h1>လုံခြုံရေး စစ်ဆေးခြင်း</h1>
        <p>PayCoinAds ဂိမ်းကို ကစားနိုင်ရန်<br><b>Singapore</b> သို့မဟုတ် <b>United States VPN</b> ချိတ်ဆက်ထားပါ။</p>

        <div class="status-box">
            <div>
                <div class="status-label">Your Location</div>
                <div class="status-value" id="locationText">Checking...</div>
            </div>
            <div id="statusIcon">🔄</div>
        </div>

        <button class="btn btn-pulse" id="checkBtn" onclick="checkVPN()">
            <span id="btnText">ပြန်လည် စစ်ဆေးမည်</span>
            <div class="spinner hidden" id="btnSpinner"></div>
        </button>
    </div>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        // Wait for Telegram initData (async injection fix)
        function getInitData() { return window.Telegram?.WebApp?.initData || ''; }
        async function waitForInitData(maxMs = 5000) {
            const t = Date.now();
            while (!getInitData() && Date.now() - t < maxMs) {
                await new Promise(r => setTimeout(r, 100));
            }
            return getInitData();
        }

            // Set header color to match bg
            tg.setHeaderColor('#05070a');
            tg.setBackgroundColor('#05070a');
        }

        const checkBtn = document.getElementById('checkBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const locationText = document.getElementById('locationText');
        const statusIcon = document.getElementById('statusIcon');

        async function checkVPN() {
            // UI Loading State
            checkBtn.disabled = true;
            btnText.textContent = "စစ်ဆေးနေသည်...";
            btnSpinner.classList.remove('hidden');
            locationText.textContent = "Connecting...";
            statusIcon.textContent = "📡";

            try {
                // Fetch to Backend
                const response = await fetch((window.__API_BASE__ || '') + '/api/check-vpn', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Telegram-Init-Data': tg?.initData || ''
                    }
                });

                const data = await response.json();

                if (data.allowed) {
                    // Success State
                    locationText.textContent = data.isAdmin ? "Admin Access 👑" : (data.countryCode === "US" ? "United States (US) ✅" : "Singapore (SG) ✅");
                    locationText.style.color = "#4ade80"; // Green
                    statusIcon.textContent = "✅";
                    
                    btnText.textContent = "အောင်မြင်ပါသည်။ ဝင်ရောက်နေသည်...";
                    btnSpinner.classList.add('hidden');
                    checkBtn.style.background = "linear-gradient(135deg, #4ade80, #22c55e)";
                    checkBtn.classList.remove('btn-pulse');

                    // Redirect to Game
                    setTimeout(() => {
                        window.location.href = '/'; 
                    }, 1500);

                } else {
                    // Fail State
                    locationText.textContent = (data.country || "Unknown") + " ❌";
                    locationText.style.color = "#fb7185"; // Red
                    statusIcon.textContent = "❌";
                    
                    // Show VPN not connected message
                    document.querySelector('p').innerHTML = "⚠️ VPN မချိတ်ဆက်ရသေးပါ။<br><b>Singapore 🇸🇬</b> သို့မဟုတ် <b>United States 🇺🇸</b><br>VPN ချိတ်ဆက်ပြီး ထပ်ကြိုးစားပါ။";
                    
                    btnText.textContent = "ထပ်မံ စစ်ဆေးမည်";
                    btnSpinner.classList.add('hidden');
                    checkBtn.disabled = false;
                }

            } catch (error) {
                console.error("VPN Check Error:", error);
                locationText.textContent = "Error";
                btnText.textContent = "ပြန်လည်ကြိုးစားပါ";
                btnSpinner.classList.add('hidden');
                checkBtn.disabled = false;
            }
        }

        // Auto check on page load
        window.onload = checkVPN;

    </script>
</body>
</html>
