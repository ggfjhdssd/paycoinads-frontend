<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // ═══════════════════════════════════════
    // API Base URL — set by Vercel env var
    // VERCEL env: VITE_API_URL = https://your-backend.onrender.com
    // ═══════════════════════════════════════
    window.__API_BASE__ = "%%VITE_API_URL%%";
  </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Clicker • PayCoinAds</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Pyidaungsu&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Pyidaungsu', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        body {
            background: #121212;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            padding: 16px 12px 100px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(20,22,27,0.6);
            backdrop-filter: blur(16px);
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255,215,0,0.15);
            z-index: 20;
        }
        .back-btn {
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            color: #ffd700;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }
        .balance {
            background: linear-gradient(145deg, rgba(255,215,0,0.15), rgba(255,165,0,0.05));
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255,215,0,0.4);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 16px;
            color: #ffd700;
        }
        .game-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            margin-bottom: 20px;
            z-index: 15;
        }
        .objects-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .falling-object {
            position: absolute;
            font-size: 32px;
            cursor: pointer;
            transform-style: preserve-3d;
            animation: flip 1s linear infinite;
            pointer-events: auto;
            z-index: 30;
            filter: drop-shadow(0 0 5px gold);
            transition: transform 0.1s;
        }
        .falling-object:active {
            transform: scale(0.9);
        }
        @keyframes flip {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        .stats-panel {
            background: rgba(20,22,27,0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 16px;
            border: 1px solid rgba(255,215,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }
        .score, .timer {
            font-size: 24px;
            font-weight: 700;
        }
        .score span, .timer span {
            color: #ffd700;
            font-size: 32px;
        }
        .timer.warning span {
            color: #ff4444 !important;
            animation: shake 0.2s infinite;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            50% { transform: translateX(3px); }
            75% { transform: translateX(-3px); }
            100% { transform: translateX(0); }
        }
        .start-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            color: #121212;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            z-index: 20;
            opacity: 0.5;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .start-btn.ready {
            opacity: 1;
            pointer-events: auto;
        }
        
        .countdown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-size: 100px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 20px gold;
            display: none;
        }
        .countdown-overlay.active {
            display: flex;
        }

        .popup-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .popup-overlay.active {
            display: flex;
        }
        .popup-content {
            background: linear-gradient(145deg, #1e1e2e, #16161f);
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 24px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
        .popup-content h2 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 32px;
        }
        .popup-content p {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .popup-btn {
            background: #ffd700;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: #121212;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        .popup-btn.secondary {
            background: transparent;
            border: 1px solid #ffd700;
            color: #ffd700;
        }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #121212;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div id="loadingScreen" class="loading-screen">
        <div style="font-size: 40px; margin-bottom: 20px;">🐻</div>
        <p>Loading Game...</p>
    </div>

    <div class="container">
        <div class="header">
            <div class="back-btn" onclick="goBack()">← Back</div>
            <div class="balance">🪙 <span id="coinBalance">0</span></div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="objects-container" id="objectsContainer"></div>
            <div class="countdown-overlay" id="countdownOverlay">3</div>
            <div class="popup-overlay" id="bombPopup">
                <div class="popup-content">
                    <h2>💣 BOOM!</h2>
                    <p>Game Over</p>
                    <button class="popup-btn" id="watchAdBtn">Watch Ad to Continue</button>
                    <button class="popup-btn secondary" id="quitBtn">Quit</button>
                </div>
            </div>
        </div>

        <div class="stats-panel">
            <div class="score">💰 <span id="scoreDisplay">0.0</span></div>
            <div class="timer" id="timerContainer">⏱️ <span id="timerDisplay">38</span>s</div>
        </div>

        <button class="start-btn" id="startBtn">Start with 50 🪙</button>
    </div>

    <script>
        const API_BASE = (window.__API_BASE__ || '') + '/api';
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready();
        // Wait for Telegram initData (async injection fix)
        function getInitData() { return window.Telegram?.WebApp?.initData || ''; }
        async function waitForInitData(maxMs = 5000) {
            const t = Date.now();
            while (!getInitData() && Date.now() - t < maxMs) {
                await new Promise(r => setTimeout(r, 100));
            }
            return getInitData();
        }
 }
        const initData = tg?.initData || '';

        // ==================== Adsgram Setup ====================
        const AD_BLOCK_ID = "23920";
        let AdController = null;
        
        try {
            if (window.Adsgram) {
                AdController = window.Adsgram.init({ blockId: AD_BLOCK_ID });
                console.log('✅ Adsgram initialized');
            }
        } catch (e) {
            console.error('Failed to init Adsgram:', e);
        }

        // ==================== Audio Setup ====================
        let audio = null;
        let audioContext = null;
        let tickInterval = null;

        function initAudio() {
            if (audio) return;
            try {
                audio = new Audio('/audio/coingame.mp3');
                audio.loop = true;
                audio.volume = 0.5;
                audio.load();
                console.log("Audio initialized");
            } catch (e) {
                console.warn('Audio not supported', e);
            }
        }

        function playMusic() {
            if (!audio) initAudio();
            if (audio) {
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise
                        .then(() => console.log("Music playing"))
                        .catch(e => console.log('Autoplay prevented:', e));
                }
            }
        }

        function pauseMusic() {
            if (audio) audio.pause();
        }

        function muteMusic() {
            if (audio) audio.volume = 0;
        }

        function unmuteMusic() {
            if (audio) audio.volume = 0.5;
        }

        function playTick() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') audioContext.resume();
            const osc = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.value = 800;
            gainNode.gain.value = 0.1;
            osc.connect(gainNode);
            gainNode.connect(audioContext.destination);
            osc.start();
            osc.stop(audioContext.currentTime + 0.1);
        }

        // ==================== DOM Elements ====================
        const coinBalanceSpan = document.getElementById('coinBalance');
        const objectsContainer = document.getElementById('objectsContainer');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const timerContainer = document.getElementById('timerContainer');
        const startBtn = document.getElementById('startBtn');
        const countdownOverlay = document.getElementById('countdownOverlay');
        const bombPopup = document.getElementById('bombPopup');
        const watchAdBtn = document.getElementById('watchAdBtn');
        const quitBtn = document.getElementById('quitBtn');
        const loadingScreen = document.getElementById('loadingScreen');

        // ==================== Game State ====================
        let currentUserId = null;
        let balance = 0;
        let gameState = 'preview'; 
        let score = 0;
        // Timer updated from 30 to 38 seconds
        let timeLeft = 38; 
        let timerInterval = null;
        let animationFrame = null;
        let objects = [];
        let lastSpawnTime = 0;
        const MAX_OBJECTS = 30; // Prevent too many objects (anti-lag)

        // Preview settings (lightweight)
        const PREVIEW_SPAWN_INTERVAL = 1000; // 1 second
        const PREVIEW_BASE_SPEED = 0.8;
        
        // Game settings
        const GAME_BASE_SPEED = 2.0; // Start fast
        const GAME_SPAWN_INTERVAL = 250; // 4 objects per second

        // Coin value distribution: 40% 1.0, 30% 0.5, 30% 0.2
        function getRandomCoinValue() {
            const rand = Math.random();
            if (rand < 0.4) return 1.0;
            if (rand < 0.7) return 0.5; // 0.4 + 0.3 = 0.7
            return 0.2;
        }

        const MAX_SCORE = 100;
        const ENTRY_FEE = 50;
        let isStarting = false;

        // ==================== Aggressive Difficulty Scaling ====================
        function getSpeedMultiplier(score) {
            if (score >= 90) return 3.0;
            if (score >= 80) return 2.6;
            if (score >= 70) return 2.2;
            if (score >= 65) return 1.8;
            if (score >= 60) return 1.5;
            return 1.2; // Score < 60
        }

        function getBombProbability(score) {
            if (score >= 90) return 0.65;
            if (score >= 80) return 0.55;
            if (score >= 70) return 0.45;
            if (score >= 65) return 0.35;
            if (score >= 60) return 0.25;
            return 0.15; // Score < 60
        }

        // ==================== Opening Ad ====================
        async function showOpeningAd() {
            loadingScreen.style.display = 'flex';
            
            if (!AdController) {
                onAdComplete();
                return;
            }

            try {
                await AdController.show().then((result) => {
                    onAdComplete();
                }).catch((err) => {
                    console.error("Ad error:", err);
                    onAdComplete();
                });
            } catch (err) {
                console.error(err);
                onAdComplete();
            }
        }

        function onAdComplete() {
            loadingScreen.style.display = 'none';
            startBtn.classList.add('ready');
            playMusic();
        }

        // ==================== User Data ====================
        async function fetchUser() {
            try {
                const res = await fetch(`${API_BASE}/user`, {
                    headers: { 'X-Telegram-Init-Data': initData }
                });
                const data = await res.json();
                if (res.ok) {
                    balance = data.coins;
                    currentUserId = data.userId;
                    coinBalanceSpan.innerText = balance.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
                }
            } catch (err) {
                console.error(err);
            }
        }

        function goBack() {
            window.location.href = '/games.html';
        }

        // ==================== Game Loop ====================
        function gameLoop(timestamp) {
            if (gameState !== 'playing' && gameState !== 'preview') {
                animationFrame = requestAnimationFrame(gameLoop);
                return;
            }

            const now = performance.now();
            const spawnInterval = (gameState === 'preview') ? PREVIEW_SPAWN_INTERVAL : GAME_SPAWN_INTERVAL;
            if (now - lastSpawnTime > spawnInterval && objects.length < MAX_OBJECTS) {
                spawnObject();
                lastSpawnTime = now;
            }

            // Determine current speed
            let currentBaseSpeed = (gameState === 'preview') ? PREVIEW_BASE_SPEED : GAME_BASE_SPEED;
            let speedMultiplier = (gameState === 'playing') ? getSpeedMultiplier(score) : 1.0;

            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                obj.y += currentBaseSpeed * speedMultiplier;
                obj.element.style.top = obj.y + 'px';

                if (obj.y > objectsContainer.clientHeight) {
                    if (obj.element.parentNode) obj.element.parentNode.removeChild(obj.element);
                    objects.splice(i, 1);
                }
            }

            animationFrame = requestAnimationFrame(gameLoop);
        }

        function spawnObject() {
            let isBomb = false;
            let value = 0;

            if (gameState === 'playing') {
                const bombProb = getBombProbability(score);
                isBomb = Math.random() < bombProb;
                if (isBomb) {
                    value = 0;
                } else {
                    value = getRandomCoinValue();
                }
            } else {
                // preview: mostly coins, few bombs (but bombs harmless)
                isBomb = Math.random() < 0.3; // 30% bomb in preview
                if (isBomb) {
                    value = 0;
                } else {
                    value = getRandomCoinValue();
                }
            }

            const symbol = isBomb ? '💣' : '🪙';
            const element = document.createElement('div');
            element.className = 'falling-object';
            element.innerText = symbol;
            
            if (gameState === 'playing') {
                element.setAttribute('data-value', value.toString());
                element.setAttribute('data-isbomb', isBomb ? 'true' : 'false');
            } else {
                element.setAttribute('data-isbomb', 'false'); // preview bombs harmless
                element.setAttribute('data-value', value.toString());
            }

            const x = Math.random() * (objectsContainer.clientWidth - 50);
            const y = -50;
            element.style.left = x + 'px';
            element.style.top = y + 'px';

            element.addEventListener('pointerdown', onObjectClick);

            objectsContainer.appendChild(element);
            objects.push({ element, x, y, value, isBomb });
        }

        function onObjectClick(e) {
            if (gameState !== 'playing') return;
            e.preventDefault();

            const target = e.currentTarget;
            const isBomb = target.getAttribute('data-isbomb') === 'true';

            if (isBomb) {
                gameState = 'paused';
                clearInterval(timerInterval);
                bombPopup.classList.add('active');
                muteMusic();
                return;
            }

            const value = parseFloat(target.getAttribute('data-value')) || 0;
            score += value;
            if (score > MAX_SCORE) score = MAX_SCORE;
            scoreDisplay.innerText = score.toFixed(1); // Show one decimal

            target.style.transform = 'scale(1.5)';
            target.style.opacity = '0';
            
            setTimeout(() => {
                const index = objects.findIndex(obj => obj.element === target);
                if (index !== -1) {
                    if(target.parentNode) target.parentNode.removeChild(target);
                    objects.splice(index, 1);
                }
            }, 50);
        }

        // ==================== Start Game ====================
        async function startGame() {
            if (isStarting) return;
            if (balance < ENTRY_FEE) {
                alert('Not enough coins!');
                return;
            }

            isStarting = true;
            startBtn.style.display = 'none';

            try {
                const res = await fetch(`${API_BASE}/games/coin-start`, {
                    method: 'POST',
                    headers: { 'X-Telegram-Init-Data': initData }
                });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.error || 'Failed to start game');
                    startBtn.style.display = 'block';
                    isStarting = false;
                    return;
                }

                balance = data.newBalance;
                coinBalanceSpan.innerText = balance.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });

                playMusic();
                resetGame(true);
                isStarting = false;
            } catch (err) {
                console.error(err);
                alert('Network error');
                startBtn.style.display = 'block';
                isStarting = false;
            }
        }

        function resetGame(withCountdown = false) {
            objects.forEach(obj => {
                if(obj.element.parentNode) obj.element.parentNode.removeChild(obj.element);
            });
            objects = [];
            score = 0;
            timeLeft = 38; // Reset to 38 seconds
            scoreDisplay.innerText = '0.0';
            timerDisplay.innerText = '38';
            timerContainer.classList.remove('warning');
            if (tickInterval) {
                clearInterval(tickInterval);
                tickInterval = null;
            }

            if (withCountdown) {
                gameState = 'countdown';
                startCountdown();
            } else {
                gameState = 'preview';
                if (animationFrame) cancelAnimationFrame(animationFrame);
                animationFrame = requestAnimationFrame(gameLoop);
            }
        }

        function startCountdown() {
            let count = 3;
            countdownOverlay.classList.add('active');
            countdownOverlay.innerText = count;

            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownOverlay.innerText = count;
                } else if (count === 0) {
                    countdownOverlay.innerText = 'GO!';
                } else {
                    clearInterval(countInterval);
                    countdownOverlay.classList.remove('active');
                    gameState = 'playing';
                    lastSpawnTime = performance.now();
                    if (!animationFrame) animationFrame = requestAnimationFrame(gameLoop);
                    startTimer();
                }
            }, 1000);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;

                if (timeLeft <= 5) {
                    timerContainer.classList.add('warning');
                    playTick();
                } else {
                    timerContainer.classList.remove('warning');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endGame('win');
                }
            }, 1000);
        }

        async function endGame(reason) {
            gameState = 'gameover';
            clearInterval(timerInterval);
            if (tickInterval) clearInterval(tickInterval);
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }

            pauseMusic();

            if (reason === 'win') {
                const finalScore = Math.min(score, MAX_SCORE);
                alert(`🎉 You Won!\nYou earned ${finalScore.toFixed(1)} coins!`);

                try {
                    const res = await fetch(`${API_BASE}/games/coin-end`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Telegram-Init-Data': initData
                        },
                        body: JSON.stringify({ earnedCoins: finalScore })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        balance = data.newBalance;
                        coinBalanceSpan.innerText = balance.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
                    }
                } catch (err) {
                    console.error(err);
                }
            }

            startBtn.style.display = 'block';
            resetGame(false);
        }

        // ==================== Watch Ad to Continue ====================
        async function watchAdToContinue() {
            if (!AdController) {
                alert('Ad not available');
                return;
            }

            try {
                const result = await AdController.show();
                if (result && result.done) {
                    playMusic();
                    resumeAfterAd();
                } else {
                    alert('You must watch the ad to continue!');
                }
            } catch (err) {
                console.error('Ad error:', err);
                alert('Ad failed to load. Please try again.');
            }
        }

        function resumeAfterAd() {
            bombPopup.classList.remove('active');
            unmuteMusic();
            
            gameState = 'countdown';
            let count = 3;
            countdownOverlay.classList.add('active');
            countdownOverlay.innerText = count;

            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownOverlay.innerText = count;
                } else if (count === 0) {
                    countdownOverlay.innerText = 'GO!';
                } else {
                    clearInterval(countInterval);
                    countdownOverlay.classList.remove('active');
                    gameState = 'playing';
                    if (!animationFrame) animationFrame = requestAnimationFrame(gameLoop);
                    startTimer();
                }
            }, 1000);
        }

        function quitGame() {
            bombPopup.classList.remove('active');
            unmuteMusic();
            endGame('quit');
        }

        // Listeners
        startBtn.addEventListener('click', startGame);
        watchAdBtn.addEventListener('click', watchAdToContinue);
        quitBtn.addEventListener('click', quitGame);

        // Init
        fetchUser();
        setInterval(fetchUser, 30000);
        
        gameState = 'preview';
        lastSpawnTime = performance.now();
        animationFrame = requestAnimationFrame(gameLoop);

        window.addEventListener('load', () => {
            showOpeningAd();
        });

    </script>
</body>
</html>
